<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>証券外務員一種 計算問題演習</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#f8f7f4;min-height:100vh;padding:1rem}
.wrap{max-width:860px;margin:0 auto;padding:1rem 0.5rem}
h1{font-size:20px;font-weight:500;color:#2C2C2A;margin-bottom:4px}
.sub{font-size:13px;color:#5F5E5A;margin-bottom:1.2rem}
.stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:1.2rem}
.sc{background:#F1EFE8;border-radius:8px;padding:10px 12px}
.sc-l{font-size:11px;color:#5F5E5A;margin-bottom:3px}
.sc-v{font-size:18px;font-weight:500;color:#2C2C2A}
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem;padding-bottom:10px;border-bottom:0.5px solid rgba(0,0,0,0.15)}
.tab{padding:5px 12px;border-radius:8px;border:0.5px solid rgba(0,0,0,0.15);font-size:12px;cursor:pointer;background:#fff;color:#5F5E5A}
.tab.on{background:#F1EFE8;color:#2C2C2A;font-weight:500;border-color:rgba(0,0,0,0.3)}
.pbar{height:4px;background:#F1EFE8;border-radius:2px;margin-bottom:1.2rem}
.pfill{height:100%;background:#185FA5;border-radius:2px;transition:width 0.3s}
.card{background:#fff;border:0.5px solid rgba(0,0,0,0.15);border-radius:12px;padding:1.2rem}
.meta{display:flex;gap:6px;margin-bottom:0.6rem;flex-wrap:wrap;align-items:center}
.badge{font-size:11px;padding:2px 9px;border-radius:6px;font-weight:500}
.note{font-size:12px;color:#5F5E5A;background:#F1EFE8;border-radius:6px;padding:6px 10px;margin-bottom:0.8rem;line-height:1.6;border-left:3px solid #85B7EB}
.qtext{font-size:15px;line-height:1.7;color:#2C2C2A;margin-bottom:0.8rem}
.fw{margin-bottom:0.8rem}
.btn-fw{padding:4px 12px;border-radius:6px;border:0.5px solid rgba(0,0,0,0.2);background:#fff;font-size:12px;cursor:pointer;color:#5F5E5A}
.btn-fw:hover{background:#F1EFE8}
.fbox{display:none;margin-top:6px;font-size:12px;background:#F1EFE8;border-radius:6px;padding:7px 10px;color:#5F5E5A;line-height:1.7}
.irow{display:flex;gap:8px;align-items:center;margin-bottom:0.9rem}
.irow input{flex:1;padding:8px 10px;border:0.5px solid rgba(0,0,0,0.2);border-radius:8px;font-size:14px;background:#fff;color:#2C2C2A}
.irow .unit{font-size:13px;color:#5F5E5A;white-space:nowrap}
.res{display:none;border-radius:8px;padding:10px 12px;margin-bottom:0.9rem;font-size:14px;line-height:1.6}
.res.ok{background:#EAF3DE;color:#27500A;border:0.5px solid #C0DD97}
.res.ng{background:#FCEBEB;color:#791F1F;border:0.5px solid #F7C1C1}
.exp{display:none;background:#F1EFE8;border-radius:8px;padding:10px 12px;margin-bottom:0.9rem;font-size:13px;color:#5F5E5A;line-height:1.9;white-space:pre-wrap}
.exp strong{display:block;font-size:14px;color:#2C2C2A;margin-bottom:6px;font-weight:500}
.brow{display:flex;gap:8px;flex-wrap:wrap}
.bta{padding:7px 18px;border-radius:8px;border:0.5px solid rgba(0,0,0,0.2);background:#fff;font-size:13px;cursor:pointer;color:#2C2C2A}
.bta:hover{background:#F1EFE8}
.btn{padding:7px 18px;border-radius:8px;border:none;background:#185FA5;color:#E6F1FB;font-size:13px;cursor:pointer;font-weight:500}
.btn:hover{background:#0C447C}
@media(max-width:600px){
  .stats{grid-template-columns:repeat(2,1fr)}
  h1{font-size:17px}
  .qtext{font-size:14px}
}
</style>
</head>
<body>
<div class="wrap">
  <h1>証券外務員一種 計算問題演習</h1>
  <p class="sub">デリバティブ（先物・オプション組み合わせ）を強化した頻出問題集</p>
  <div class="stats">
    <div class="sc"><div class="sc-l">出題数</div><div class="sc-v" id="s1">0</div></div>
    <div class="sc"><div class="sc-l">正解数</div><div class="sc-v" id="s2">0</div></div>
    <div class="sc"><div class="sc-l">正解率</div><div class="sc-v" id="s3">—</div></div>
    <div class="sc"><div class="sc-l">分野</div><div class="sc-v" id="s4" style="font-size:12px">全分野</div></div>
  </div>
  <div class="tabs">
    <div class="tab on" onclick="SC(this,'all')">全分野</div>
    <div class="tab" onclick="SC(this,'bond')">債券利回り</div>
    <div class="tab" onclick="SC(this,'stock')">株式指標</div>
    <div class="tab" onclick="SC(this,'credit')">信用取引</div>
    <div class="tab" onclick="SC(this,'futures')">先物取引</div>
    <div class="tab" onclick="SC(this,'option')">オプション単体</div>
    <div class="tab" onclick="SC(this,'combo')">コール＋プット組合せ</div>
  </div>
  <div class="pbar"><div class="pfill" id="pf" style="width:0%"></div></div>
  <div id="qa"></div>
</div>
<script>
function fl3(x){return Math.floor(x*1000)/1000;}
function r2(x){return Math.round(x*100)/100;}
var b1=fl3((3+(100-97.5)/7)/97.5*100);
var b2=fl3((1.3+(100-99)/4)/99*100);
var b3=fl3((1.5+(100-103)/6)/103*100);
var b4=fl3((2+(101-98)/3)/98*100);
var b5=fl3((2.1+(105-101.5)/4)/101.5*100);
var b6=fl3(2/99.5*100);
var b7=r2(1000000*0.03*9/365);
var f1=(12000-11000)*1000*10;
var f2=(1650-1600)*10000*5;
var f3fc=Math.floor(1800*(0.05-0.025)*219/365*100)/100;
var f3=r2(1800+f3fc);
var f4loss=-(15000-14500)*1000*3;
var op1=1000-300;
var op2=(12000-11000)-200;
var op3=14000+500;
var op4=13000-300;
var op5=400-(16000-15000);
var op6=300-(12000-11500);
var cm1=((14500-14000)-200)*10*1000+(-250)*10*1000;
var cm2=(200+250)*10*1000;
var cm3=(200-(15000-14000)+250)*10*1000;
var cm5=(-500+150)*10*1000;
var cm6=((16500-15500-150)*10*1000)+(-150*10*1000);
var cm7=(150+150)*10*1000;
var cm8=(150*10*1000)+((150-(14500-13500))*10*1000);
var cm9=((1860-1750-50)*10*10000)+((30-(1860-1820))*10*10000);
var cm10=(200-(14500-14000)+250)*10*1000;
var QS=[
  {cat:'bond',tag:'応募者利回り',note:null,q:'利率3%、償還期間7年、発行価格97.5円の国債の応募者利回りを求めよ。（小数点第3位以下切り捨て）（%）',f:'応募者利回り＝{ 利率＋(100－発行価格)÷償還年数 } ÷ 発行価格 × 100',ans:b1,tol:0.005,exp:'{ 3＋(100－97.5)÷7 } ÷ 97.5 × 100 ＝ 3.444…% → '+b1+'%'},
  {cat:'bond',tag:'最終利回り',note:null,q:'利率1.3%、残存期間4年、購入価格99円の国債の最終利回りを求めよ。（小数点第3位以下切り捨て）（%）',f:'最終利回り＝{ 利率＋(100－購入価格)÷残存年数 } ÷ 購入価格 × 100',ans:b2,tol:0.005,exp:'{ 1.3＋(100－99)÷4 } ÷ 99 × 100 ＝ 1.565…% → '+b2+'%'},
  {cat:'bond',tag:'最終利回り（割高債）',note:null,q:'利率1.5%、残存期間6年、購入価格103円の国債の最終利回りを求めよ。（小数点第3位以下切り捨て）（%）',f:'最終利回り＝{ 利率＋(100－購入価格)÷残存年数 } ÷ 購入価格 × 100',ans:b3,tol:0.005,exp:'{ 1.5＋(100－103)÷6 } ÷ 103 × 100 ＝ 0.970…% → '+b3+'%'},
  {cat:'bond',tag:'所有期間利回り',note:null,q:'利率2%、10年満期の国債を98円で購入し3年後に101円で売却した。所有期間利回りを求めよ。（小数点第3位以下切り捨て）（%）',f:'所有期間利回り＝{ 利率＋(売却価格－購入価格)÷所有期間 } ÷ 購入価格 × 100',ans:b4,tol:0.005,exp:'{ 2＋(101－98)÷3 } ÷ 98 × 100 ＝ 3.061…% → '+b4+'%'},
  {cat:'bond',tag:'所有期間利回り',note:null,q:'利率2.1%、10年満期の国債を101.5円で購入し4年後に105円で売却した。所有期間利回りを求めよ。（小数点第3位以下切り捨て）（%）',f:'所有期間利回り＝{ 利率＋(売却価格－購入価格)÷所有期間 } ÷ 購入価格 × 100',ans:b5,tol:0.005,exp:'{ 2.1＋(105－101.5)÷4 } ÷ 101.5 × 100 ＝ 2.931…% → '+b5+'%'},
  {cat:'bond',tag:'直接利回り',note:null,q:'表面利率2%の債券を99.5円で購入した。直接利回りを求めよ。（小数点第3位以下切り捨て）（%）',f:'直接利回り＝利率 ÷ 購入価格 × 100',ans:b6,tol:0.005,exp:'2 ÷ 99.5 × 100 ＝ 2.010…% → '+b6+'%'},
  {cat:'bond',tag:'経過利子',note:null,q:'利率3%で3月20日に利払日のある国債を3月29日受渡で額面100万円で売却した。経過利子（円）を求めよ。（1年365日）',f:'経過利子＝額面 × 利率 × 経過日数 ÷ 365',ans:b7,tol:1,exp:'3月20日→3月29日＝9日間\n1,000,000 × 0.03 × 9 ÷ 365 ＝ '+b7+'円'},
  {cat:'stock',tag:'PER',note:'PER（株価収益率）：株価が1株当たり純利益（EPS）の何倍かを示す指標。',q:'1株当たり純利益（EPS）50円、株価750円のときPER（倍）を求めよ。',f:'PER＝株価 ÷ EPS',ans:15,tol:0.01,exp:'750 ÷ 50 ＝ 15倍'},
  {cat:'stock',tag:'PBR',note:'PBR（株価純資産倍率）：株価が1株当たり純資産（BPS）の何倍かを示す指標。',q:'1株当たり純資産（BPS）600円、株価900円のときPBR（倍）を求めよ。',f:'PBR＝株価 ÷ BPS',ans:1.5,tol:0.01,exp:'900 ÷ 600 ＝ 1.5倍'},
  {cat:'stock',tag:'配当利回り',note:null,q:'年間配当金30円、株価1,500円のとき配当利回り（%）を求めよ。',f:'配当利回り＝年間配当金 ÷ 株価 × 100',ans:2.0,tol:0.01,exp:'30 ÷ 1500 × 100 ＝ 2.0%'},
  {cat:'stock',tag:'配当性向',note:null,q:'1株当たり配当金25円、1株当たり純利益（EPS）100円のとき配当性向（%）を求めよ。',f:'配当性向＝1株当たり配当金 ÷ EPS × 100',ans:25,tol:0.1,exp:'25 ÷ 100 × 100 ＝ 25%'},
  {cat:'stock',tag:'ROE',note:null,q:'当期純利益4,000万円、自己資本2億円のときROE（%）を求めよ。',f:'ROE＝当期純利益 ÷ 自己資本 × 100',ans:20,tol:0.1,exp:'4,000万 ÷ 20,000万 × 100 ＝ 20%'},
  {cat:'credit',tag:'委託保証金・最大建玉',note:null,q:'委託保証金300万円、委託保証金率30%、株価500円のとき信用取引で最大何株買建てできるか。（株）',f:'建玉上限＝保証金 ÷ 保証金率　→　株数＝建玉上限 ÷ 株価',ans:20000,tol:1,exp:'① 建玉上限＝300万 ÷ 0.30 ＝ 1,000万円\n② 株数＝1,000万 ÷ 500円 ＝ 20,000株'},
  {cat:'credit',tag:'追加保証金（追証）',note:null,q:'信用買い建玉400万円、委託保証金120万円。建玉評価額が320万円に下落（委託保証金率30%）。追加保証金（万円）はいくらか。',f:'評価損＝建玉－評価額　保証金残＝保証金－評価損　追証＝評価額×30%－保証金残',ans:56,tol:0.1,exp:'① 評価損＝400－320＝80万円\n② 保証金残＝120－80＝40万円\n③ 必要保証金＝320×0.30＝96万円\n④ 追証＝96－40＝56万円'},
  {cat:'credit',tag:'追加保証金（追証）',note:null,q:'信用買い建玉2,000万円（1株1,000円×20,000株）、委託保証金600万円（委託保証金率30%）。株価800円に下落時の追加保証金（万円）を求めよ。',f:'評価損＝建玉－評価額　保証金残＝保証金－評価損　追証＝評価額×30%－保証金残',ans:280,tol:0.1,exp:'① 評価額＝800×20,000株＝1,600万円\n② 評価損＝2,000－1,600＝400万円\n③ 保証金残＝600－400＝200万円\n④ 必要保証金＝1,600×0.30＝480万円\n⑤ 追証＝480－200＝280万円'},
  {cat:'futures',tag:'日経225・売り建て損益',note:null,q:'日経225先物を12,000円で10単位売り建て、SQ11,000円で決済した。損益（円）を求めよ。（取引単位1,000倍、手数料なし）',f:'損益＝(売建値－決済値) × 1,000 × 単位数',ans:f1,tol:1,exp:'売り建て → 価格下落で利益\n(12,000－11,000) × 1,000 × 10 ＝ '+f1.toLocaleString()+'円（利益）'},
  {cat:'futures',tag:'TOPIX・買い建て損益',note:null,q:'TOPIX先物を1,600ポイントで5単位買い建て、1,650ポイントで決済した。損益（円）を求めよ。（取引単位10,000円、手数料なし）',f:'損益＝(決済値－買建値) × 10,000 × 単位数',ans:f2,tol:1,exp:'買い建て → 価格上昇で利益\n(1,650－1,600) × 10,000 × 5 ＝ '+f2.toLocaleString()+'円（利益）'},
  {cat:'futures',tag:'先物理論価格',note:null,q:'現物資産1,800円、短期金利5%、配当利回り2.5%、期限日まで219日のとき先物理論価格（円）を求めよ。（キャリーコスト小数第3位以下切り捨て）',f:'先物理論価格＝現物価格 × { 1＋(短期金利－配当利回り) × 残存日数÷365 }',ans:f3,tol:0.5,exp:'キャリーコスト＝1,800×(0.05－0.025)×219÷365＝'+f3fc+'円（切り捨て）\n先物理論価格＝1,800＋'+f3fc+'＝'+f3+'円'},
  {cat:'futures',tag:'日経225・買い建て損失',note:null,q:'日経225先物を15,000円で3単位買い建てたが14,500円に下落し決済した。損益（円）を求めよ。（損失はマイナスで入力、取引単位1,000倍）',f:'損益＝(決済値－買建値) × 1,000 × 単位数',ans:f4loss,tol:1,exp:'(14,500－15,000) × 1,000 × 3 ＝ '+f4loss.toLocaleString()+'円（損失）'},
  {cat:'option',tag:'コール買い・満期損益',note:'コール・オプション：原資産を「買う権利」。原資産が上昇するほど利益が大きくなり、損失はプレミアムに限定される。',q:'日経225コール（権利行使価格14,000円）をプレミアム300円で購入。満期日に原資産15,000円のとき買い手の損益（円）を求めよ。（1単位当たり）',f:'損益＝max(原資産価格－権利行使価格, 0) － プレミアム',ans:op1,tol:0.1,exp:'内在価値＝15,000－14,000＝1,000円\n損益＝1,000－300＝'+op1+'円（利益）\n損益分岐点＝14,000＋300＝14,300円'},
  {cat:'option',tag:'プット買い・満期損益',note:'プット・オプション：原資産を「売る権利」。原資産が下落するほど利益が大きくなり、損失はプレミアムに限定される。',q:'日経225プット（権利行使価格12,000円）をプレミアム200円で購入。満期日に原資産11,000円のとき買い手の損益（円）を求めよ。（1単位当たり）',f:'損益＝max(権利行使価格－原資産価格, 0) － プレミアム',ans:op2,tol:0.1,exp:'内在価値＝12,000－11,000＝1,000円\n損益＝1,000－200＝'+op2+'円（利益）'},
  {cat:'option',tag:'コール買い・損益分岐点',note:'コール・オプション：原資産を「買う権利」。原資産が上昇するほど利益が大きくなり、損失はプレミアムに限定される。',q:'日経225コール（権利行使価格14,000円）のプレミアムが500円。買い手の損益分岐点（円）を求めよ。',f:'コール買い損益分岐点＝権利行使価格＋プレミアム',ans:op3,tol:0.1,exp:'14,000＋500＝'+op3+'円'},
  {cat:'option',tag:'プット買い・損益分岐点',note:'プット・オプション：原資産を「売る権利」。原資産が下落するほど利益が大きくなり、損失はプレミアムに限定される。',q:'日経225プット（権利行使価格13,000円）のプレミアムが300円。買い手の損益分岐点（円）を求めよ。',f:'プット買い損益分岐点＝権利行使価格－プレミアム',ans:op4,tol:0.1,exp:'13,000－300＝'+op4+'円'},
  {cat:'option',tag:'コール売り・満期損益',note:'コール売り：プレミアムを受け取る代わりに権利行使に応じる義務を負う。最大利益はプレミアムのみ、損失は理論上無限大。',q:'日経225コール（権利行使価格15,000円）をプレミアム400円で売った。満期日に原資産16,000円のとき売り手の損益（円）を求めよ。（損失はマイナスで入力）',f:'コール売り損益＝プレミアム受取 － max(原資産価格－権利行使価格, 0)',ans:op5,tol:0.1,exp:'400－(16,000－15,000)＝400－1,000＝'+op5+'円（損失）'},
  {cat:'option',tag:'プット売り・満期損益',note:'プット売り：プレミアムを受け取る代わりに権利行使に応じる義務を負う。最大利益はプレミアムのみ。',q:'日経225プット（権利行使価格12,000円）をプレミアム300円で売った。満期日に原資産11,500円のとき売り手の損益（円）を求めよ。（損失はマイナスで入力）',f:'プット売り損益＝プレミアム受取 － max(権利行使価格－原資産価格, 0)',ans:op6,tol:0.1,exp:'300－(12,000－11,500)＝300－500＝'+op6+'円（損失）'},

var CN={all:'全分野',bond:'債券利回り',stock:'株式指標',credit:'信用取引',futures:'先物取引',option:'オプション単体',combo:'コール＋プット組合せ'};
var CC={bond:'background:#E6F1FB;color:#0C447C',stock:'background:#EAF3DE;color:#27500A',credit:'background:#FBEAF0;color:#72243E',futures:'background:#FAEEDA;color:#633806',option:'background:#EEEDFE;color:#3C3489',combo:'background:#FAECE7;color:#4A1B0C'};
var cur='all',cq=null,done=false,tot=0,cor=0;
function SC(el,c){document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on')});el.classList.add('on');cur=c;document.getElementById('s4').textContent=CN[c];NQ();}
function GP(){return cur==='all'?QS:QS.filter(function(q){return q.cat===cur});}
function NQ(){done=false;var p=GP();if(!p.length){document.getElementById('qa').innerHTML='<p style="text-align:center;padding:2rem;color:#5F5E5A;font-size:14px">問題なし</p>';return;}cq=p[Math.floor(Math.random()*p.length)];RQ();}
function TF(){var b=document.getElementById('fb');var btn=document.getElementById('fbtn');if(b.style.display==='none'){b.style.display='block';btn.textContent='公式を隠す';}else{b.style.display='none';btn.textContent='公式を見る';}}
function RQ(){var q=cq;var h='<div class="card">';h+='<div class="meta"><span class="badge" style="'+CC[q.cat]+'">'+CN[q.cat]+'</span><span class="badge" style="background:#F1EFE8;color:#5F5E5A">'+q.tag+'</span></div>';if(q.note){h+='<div class="note">'+q.note+'</div>';}h+='<div class="qtext">'+q.q+'</div>';h+='<div class="fw"><button class="btn-fw" id="fbtn" onclick="TF()">公式を見る</button><div class="fbox" id="fb">'+q.f+'</div></div>';h+='<div class="irow"><input type="number" id="ai" placeholder="数値を入力（Enterで答え合わせ）" step="1"><span class="unit">← 答え</span></div>';h+='<div class="res" id="ri"></div>';h+='<div class="exp" id="ei"><strong>解説・計算過程</strong><span id="et"></span></div>';h+='<div class="brow"><button class="bta" onclick="CK()">答え合わせ</button><button class="btn" onclick="NQ()">次の問題 →</button></div></div>';document.getElementById('qa').innerHTML=h;var i=document.getElementById('ai');i.focus();i.addEventListener('keydown',function(e){if(e.key==='Enter')CK();});}
function CK(){if(done)return;var v=parseFloat(document.getElementById('ai').value);if(isNaN(v)){alert('数値を入力してください');return;}done=true;tot++;var ok=Math.abs(v-cq.ans)<=cq.tol;if(ok)cor++;var r=document.getElementById('ri');r.style.display='block';r.className='res '+(ok?'ok':'ng');r.textContent=ok?'正解！ 答え：'+cq.ans.toLocaleString():'不正解。正解は '+cq.ans.toLocaleString()+' です。（あなたの回答：'+v.toLocaleString()+'）';document.getElementById('ei').style.display='block';document.getElementById('et').textContent=cq.exp;document.getElementById('s1').textContent=tot;document.getElementById('s2').textContent=cor;document.getElementById('s3').textContent=Math.round(cor/tot*100)+'%';document.getElementById('pf').style.width=Math.min(tot/20*100,100)+'%';}
NQ();
</script>
